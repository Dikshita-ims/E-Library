<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📚 E- L I B R A R Y </h1>
        </div>
    </header>

    <main class="container">
        <div class="library-content">
            <!-- Left Section - Book Image and Details -->
            <div class="book-showcase">
                <img src="https://th.bing.com/th/id/R.637c210a363c4287bca5cb9c88026c64?rik=Mwr56OKHieJzfw&riu=http%3a%2f%2flms.psgitech.ac.in%2fpluginfile.php%2f5222%2fcourse%2foverviewfiles%2fimage.jpg&ehk=VJPdn3a0M11Wsic1oIqRXg2cszRjZUFwdqeRCtgEF6Y%3d&risl=&pid=ImgRaw&r=0"
                     alt="Discrete Matematics" 
                     class="featured-image">
                <div class="featured-book">
                    <h3>Featured Book</h3>
                    <p><strong>Discrete Structure and Theory of Logic</strong></p>
                    <p class="subtitle">Perfect for beginners</p>
                </div>
            </div>

            <!-- Right Section - Book List -->
            <div class="book-list">
                <h2>Discrete Structure and Theory of Logic </h2>
                <div class="books-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Book Title</th>
                                <th>Author</th>
                                <th>Available</th>
                                <th>Issued</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="booksList">
                            <!-- Books will be added here by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="script2.js"></script>
</body>
</html>
